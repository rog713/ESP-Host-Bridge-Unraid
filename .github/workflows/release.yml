name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync xz-utils

      - name: Verify tag matches project version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(python3 - <<'PY'
from __future__ import annotations
import re
from pathlib import Path
raw = Path("pyproject.toml").read_text(encoding="utf-8")
match = re.search(r'(?m)^version\s*=\s*"([^"\n]+)"\s*$', raw)
print(match.group(1) if match else "")
PY
)"
          TAG="${GITHUB_REF_NAME#v}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" != "${TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pyproject version ${VERSION}" >&2
            exit 1
          fi

      - name: Build plugin artifacts
        run: unraid_plugin/build_unraid_plugin.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            unraid_plugin/dist/esp-host-bridge.plg
            unraid_plugin/dist/esp-host-bridge-*.txz
